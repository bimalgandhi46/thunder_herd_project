name: Build & Push Docker Image to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Spring Boot JAR
        run: mvn -B package --file pom.xml

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u bimalgandhi46 --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/bimalgandhi46/springbootapp:latest \
            .

      - name: Push Docker image to GHCR
        run: docker push ghcr.io/bimalgandhi46/springbootapp:latest

      # Optional: Trigger deployment workflow
      - name: Trigger Ansible Deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GHCR_TOKEN }}
          repository: bimalgandhi46/thunder_herd_project
          event-type: deploy
