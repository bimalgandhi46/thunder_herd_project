name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]   # adjust to your branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code (for Ansible files)
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: ansible-cicd-springboot/roles/deploy_app/files

      - name: Normalize JAR filename
        shell: bash
        run: |
          cd ansible-cicd-springboot/roles/deploy_app/files
          JAR=$(ls *.jar | head -n1)
          if [ -z "$JAR" ]; then
            echo "No JAR downloaded"; exit 1
          fi
          mv "$JAR" springboot-app.jar

      - name: Configure SSH for Ansible
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\nStrictHostKeyChecking no\n" > ~/.ssh/config

      - name: Run Ansible deploy
        working-directory: ansible-cicd-springboot
        run: ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml

      - name: Post-deploy health check
        working-directory: ansible-cicd-springboot
        run: ansible-playbook -i inventory/hosts.yml playbooks/health.yml
