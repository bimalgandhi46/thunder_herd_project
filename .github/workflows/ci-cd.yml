name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Spring Boot repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Access current repo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Ansible repo
        uses: actions/checkout@v4
        with:
          repository: bimalgandhi46/ansible-cicd-springboot-
          path: ansible-cicd-springboot
          token: ${{ secrets.PAT_TOKEN }}   # Access private Ansible repo

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: ./jar

      - name: Move JAR into role files
        working-directory: ansible-cicd-springboot-
        run: |
          mkdir -p roles/deploy_app/files
          mv ../jar/*.jar roles/deploy_app/files/springboot-app.jar

      - name: List files before Ansible
        working-directory: ansible-cicd-springboot-
        run: ls -lh roles/deploy_app/files/

      - name: Configure SSH
        working-directory: ansible-cicd-springboot-
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          for host in $(grep ansible_host inventory/hosts.yml | awk '{print $2}'); do
            ssh-keyscan -H $host >> ~/.ssh/known_hosts
          done

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        working-directory: ansible-cicd-springboot-
        run: |
          ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml
