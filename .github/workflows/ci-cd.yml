name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout thunder_herd_project (Spring Boot source)
      - name: Checkout thunder_herd_project
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build Spring Boot JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Upload JAR artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 1. Checkout thunder_herd_project (for context, not used in deploy)
      - name: Checkout thunder_herd_project
        uses: actions/checkout@v4

      # 2. Set up SSH key for private repo access
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"

      # 3. Clone ansible-cicd-springboot repo
      - name: Clone ansible-cicd-springboot
        run: git clone git@github.com:bimalgandhi46/ansible-cicd-springboot.git

      # 4. Download JAR artifact into Ansible role
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app
          path: ansible-cicd-springboot/roles/deploy_app/files/

      # 5. Install Ansible
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # 6. Debug workspace
      - name: Debug workspace
        run: |
          pwd
          ls -R ansible-cicd-springboot

      # 7. Run Ansible