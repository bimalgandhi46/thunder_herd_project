name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout thunder_herd_project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout thunder_herd_project
        uses: actions/checkout@v4

      # 1. Set up SSH key for private repo access
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # 2. Clone ansible-cicd-springb00t using SSH
      - name: Clone ansible-cicd-springboot-
        run: git clone git@github.com:bimalgandhi46/ansible-cicd-springboot-.git

      # 3. Download JAR artifact into Ansible role
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app
          path: ansible-cicd-springboot-/roles/deploy_app/files/

      # 4. Install Ansible
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # 5. Debug workspace
      - name: Debug workspace
        run: |
          pwd
          ls -R

      # 6. Run Ansible Playbook
      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible-cicd-springboot-/inventory/hosts.yml ansible-cicd-springboot-/playbooks/deploy.yml
