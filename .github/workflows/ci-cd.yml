name: CI-CD Pipeline

on:
  push:
    branches: ["main"]   # runs on push to main branch
  workflow_dispatch:     # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: springapp
          path: target/springapp.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      INVENTORY_REPO: bimalgandhi46/ansible-cicd-springboot   # ✅ your repo
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: springapp
          path: artifacts

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INVENTORY_REPO }}
          path: ansible

      - name: Set up SSH for Ansible
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 10.0.0.2 10.0.0.3 10.0.0.4 >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: |
          python3 -m pip install --user ansible
          echo "$ANSIBLE_VAULT_PASSWORD" > vault.pass

      - name: Deploy to app servers
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/deploy.yml \
            --extra-vars "artifact_path=$(ls artifacts/*.jar | head -n 1)" \
            --vault-password-file vault.pass
