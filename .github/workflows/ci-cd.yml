name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout thunder_herd_project (Spring Boot source)
      - name: Checkout thunder_herd_project
        uses: actions/checkout@v4

      # 2. Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build Spring Boot JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Checkout ansible-cicd-springboot repo
      - name: Checkout ansible-cicd-springboot
        uses: actions/checkout@v4
        with:
          repository: bimalgandhi46/ansible-cicd-springboot
          path: ansible-cicd-springboot
          token: ${{ secrets.PAT_TOKEN }}   # <-- use PAT secret here

      # 5. Copy JAR into deploy_app role
      - name: Copy JAR into ansible-cicd-springboot
        run: |
          cp target/*.jar ansible-cicd-springboot/roles/deploy_app/files/

      # 6. Commit and push changes
      - name: Commit and push JAR
        run: |
          cd ansible-cicd-springboot
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add roles/deploy_app/files/*.jar
          git commit -m "Add latest build JAR"
          git push
