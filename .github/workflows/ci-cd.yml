name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]   # adjust if needed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      # 🔍 Debug: confirm JAR exists in target/
      - name: List contents of target/ after build
        run: ls -lh target/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/springapp.jar   # matches Maven output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code (for Ansible files)
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: ansible-cicd-springboot/roles/deploy_app/files

      # 🔍 Debug: confirm artifact was downloaded
      - name: List contents of files/ after download
        run: ls -lh ansible-cicd-springboot/roles/deploy_app/files/

      - name: Normalize JAR filename
        run: |
          cd ansible-cicd-springboot/roles/deploy_app/files
          mv springapp.jar springboot-app.jar

      # 🔍 Debug: confirm rename worked
      - name: List contents of files/ after rename
        run: ls -lh ansible-cicd-springboot/roles/deploy_app/files/

      - name: Configure SSH for Ansible
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\nStrictHostKeyChecking no\n" > ~/.ssh/config

      - name: Run Ansible deploy
        working-directory: ansible-cicd-springboot
        run: ansible-playbook -i inventory/hosts.yml playbooks/deploy.yml

      - name: Post-deploy health check
        working-directory: ansible-cicd-springboot
        run: ansible-playbook -i inventory/hosts.yml playbooks/health.yml
