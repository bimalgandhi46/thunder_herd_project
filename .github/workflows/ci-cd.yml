name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: ansible-cicd-springboot/roles/deploy_app/files

      - name: Rename JAR
        run: |
          mv ansible-cicd-springboot/roles/deploy_app/files/*.jar \
             ansible-cicd-springboot/roles/deploy_app/files/springboot-app.jar

      - name: List files before Ansible
        run: ls -lh ansible-cicd-springboot/roles/deploy_app/files/

      - name: Set up Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ansible-cicd-springboot/inventory/hosts.yml \
                           ansible-cicd-springboot/playbooks/deploy.yml
