name: Build and Deploy Spring Boot App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build with Maven (adjust if you use Gradle)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Upload JAR artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download JAR artifact from build job
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app
          path: .

      # Setup SSH key from GitHub secret
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Add known hosts from your inventory
      - name: Add known hosts
        run: |
          for host in $(grep ansible_host inventory/hosts.yml | awk '{print $2}'); do
            ssh-keyscan -H $host >> ~/.ssh/known_hosts
          done

      # Debug: list repo files and artifact
      - name: List repository files
        run: |
          ls -R

      # Install Ansible
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # Run Ansible playbook
      - name: Run Ansible playbook
        run: |
          ansible-playbook -i inventory/hosts.yml playbook/deploy.yml
