name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar
          path: ./jar

      - name: Move JAR into role files
        working-directory: ansible-cicd-springboot
        run: |
          mkdir -p roles/deploy_app/files
          mv ../jar/*.jar roles/deploy_app/files/springboot-app.jar

      - name: List files before Ansible
        working-directory: ansible-cicd-springboot
        run: ls -lh roles/deploy_app/files/

      - name: Configure SSH
        working-directory: ansible-cicd-springboot
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          for host in $(grep