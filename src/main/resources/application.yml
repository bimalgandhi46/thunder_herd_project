server:
  port: 8080

spring:
  application:
    name: bankapp

  datasource:
    url: jdbc:postgresql://10.0.0.2:5432/bank_data
    username: springbootappuser
    password: Test1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - 10.0.0.5:26379
          - 10.0.0.6:26379
          - 10.0.0.19:26379
      timeout: 2000

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
