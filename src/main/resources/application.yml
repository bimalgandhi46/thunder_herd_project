server:
  port: 8080

  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 2000
    connection-timeout: 5000

spring:
  application:
    name: bankapp

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - 10.0.0.2:26379
          - 10.0.0.3:26379
          - 10.0.0.4:26379

      password:
      timeout: 3s

      lettuce:
        read-from: replica-preferred
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 20
          time-between-eviction-runs: 60s

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    enable:
      executor: true
      http: true
      tomcat: true
      jvm: true

    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[executor]": true

      percentiles:
        "[http.server.requests]": 0.5,0.95,0.99

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.data.redis: INFO
    io.lettuce.core: INFO