server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://10.0.0.13:5432/bank_data
    username: springbootappuser
    password: Test1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false

  redis:
    sentinel:
      master: mymaster
      nodes:
        - 10.0.0.2:26379
        - 10.0.0.3:26379
        - 10.0.0.4:26379

    connect-timeout: 3s

    lettuce:
      read-from: replica-preferred
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        time-between-eviction-runs: 60s

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
