server:
  port: 8080

spring:
  application:
    name: bankapp

  datasource:
    url: jdbc:postgresql://10.0.0.13:5432/bank_data
    username: springbootappuser
    password: Test1234
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - 10.0.0.2:26379
          - 10.0.0.3:26379
          - 10.0.0.4:26379

      timeout: 3s

      lettuce:
        read-from: replica-preferred
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 20
          time-between-eviction-runs: 60s

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    enable:
      jdbc: true
      executor: true
      http: true
      tomcat: true
      jvm: true

    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[jdbc.connections]": true
        "[executor]": true

      percentiles:
        "[http.server.requests]": 0.5,0.95,0.99

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.data.redis: INFO
    io.lettuce.core: INFO
