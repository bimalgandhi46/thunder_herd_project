server:
  port: 8080

spring:
  application:
    name: bankapp

  datasource:
    url: jdbc:postgresql://10.0.0.13:5432/bank_data
    username: springbootappuser
    password: Test1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - 10.0.0.2:26379
          - 10.0.0.3:26379
          - 10.0.0.4:26379

      connect-timeout: 3s

      lettuce:
        read-from: replica-preferred
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          time-between-eviction-runs: 60s

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.data.redis: INFO
    io.lettuce.core: INFO
