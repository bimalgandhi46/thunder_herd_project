server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 20

spring:
  application:
    name: thunder-herd-service

  datasource:
    url: jdbc:postgresql://localhost:5432/transactions
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
    show-sql: false

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms

logging:
  level:
    root: INFO
    com.example.cache: DEBUG
    org.springframework.web: INFO
    io.github.resilience4j: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: thunder-herd-service

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 50
        failure-rate-threshold: