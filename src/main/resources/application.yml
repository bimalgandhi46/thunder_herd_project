server:
  port: 8080

spring:
  datasource:
    # These placeholders will resolve to your systemd env vars
    url: jdbc:postgresql://10.0.0.2:5432/bank_data
    username: postgres
    password: Test1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # options: none, validate, update, create, create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true       # optional: logs SQL statements for debugging

  sql:
    init:
      mode: always       # ensures schema/data scripts run if present

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
