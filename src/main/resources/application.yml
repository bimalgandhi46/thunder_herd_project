server:
  port: 8080

  tomcat:
    threads:
      max: 100        # was 300 – too many vs DB connections
      min-spare: 20
    accept-count: 200
    connection-timeout: 5000

spring:
  application:
    name: bankapp

  datasource:
    url: jdbc:postgresql://10.0.0.13:5432/bank_data
    username: springbootappuser
    password: Test1234
    driver-class-name: org.postgresql.Driver

    hikari:
      # Keep this conservative per instance; DB is your bottleneck
      maximum-pool-size: 10      # was 30
      minimum-idle: 5            # was 10
      idle-timeout: 600000       # 10m – avoid aggressive churn
      max-lifetime: 1800000      # 30m – below PG / network timeouts
      connection-timeout: 30000  # 30s – fine
      pool-name: HikariPool
      leak-detection-threshold: 2000  # NEW – log if a connection is held > 2s

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      sentinel:
        master: mymaster
        nodes:
          - 10.0.0.2:26379
          - 10.0.0.3:26379
          - 10.0.0.4:26379

      password:        # explicit empty – OK for no auth
      timeout: 3s

      lettuce:
        read-from: replica-preferred
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 20
          time-between-eviction-runs: 60s

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  task:
    execution:
      pool:
        core-size: 20      # was 50 – align with DB capacity
        max-size: 50       # was 100
        queue-capacity: 500
      thread-name-prefix: async-

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    enable:
      jdbc: true
      executor: true
      http: true
      tomcat: true
      jvm: true

    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
        "[jdbc.connections]": true
        "[executor]": true

      percentiles:
        "[http.server.requests]": 0.5,0.95,0.99

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.data.redis: INFO
    io.lettuce.core: INFO
